apiVersion: v1
kind: Pod
metadata:
  name: mysql-pod
  labels:
    name: mysql
spec:
  containers:
  - name: mysql-container
    image: mysql
    resources:
      limits:
        memory: "1024Mi"
        cpu: "2048m"
    ports:
      - containerPort: 3306
    env:
      - name: MYSQL_ROOT_PASSWORD
        valueFrom:
          secretKeyRef:
            name: mysecret
            key: password
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  type: "NodePort"
  selector:
    name: mysql
  ports:
  - port: 3306
    targetPort: 3306
    nodePort: 32006
---
apiVersion: v1
kind: Secret
metadata:
  name: mysecret
type: Opaque
stringData:
  password: secretpass

