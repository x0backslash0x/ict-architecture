apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpd-deployment
  labels:
    app: httpd
spec:
  replicas: 3
  selector:
    matchLabels:
      app: httpd
  template:
    metadata:
      labels:
        app: httpd
    spec:
      containers:
      - name: httpd
        image: httpd:2.4.61
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
---

apiVersion: v1
kind: Service
metadata:
  name: oef2-service
spec:
  type: NodePort
  selector:
    app: httpd
  ports:
  - port: 1042  # poort van de service
    targetPort: 80
    nodePort: 30042  # deze poort zal toegankelijk zijn aan de buitenwereld

# kubectl apply oefening3-deployment.yml
# kubectl rollout status deployments/http-deployment
# kubectl rollout undo deployments/httpd-deployment
